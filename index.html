<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ahmad's Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0c;--bg2:#111116;--bg3:#18181f;--bg4:#1f1f28;--bg5:#262632;--gold:#c9a84c;--gold2:#e8c97a;--gold3:#f5e4b0;--gold-dim:rgba(201,168,76,0.15);--gold-border:rgba(201,168,76,0.25);--text:#f0ead8;--text2:#9e9880;--text3:#5a5640;--red:#c94c4c;--blue:#4c7ec9;--green:#4caa6e;--purple:#8b6ec9;--orange:#c97a3a;--teal:#3aa89b;--radius:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-weight:300;min-height:100vh;background-image:radial-gradient(ellipse at 20% 0%,rgba(201,168,76,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(201,168,76,0.04) 0%,transparent 50%);}
header{text-align:center;padding:52px 20px 36px;position:relative;}
header::after{content:'';display:block;width:120px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:20px auto 0;}
.header-eyebrow{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:10px;}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,7vw,58px);font-weight:600;color:var(--text);line-height:1;letter-spacing:-1px;}
h1 span{color:var(--gold);font-style:italic;}
.header-sub{font-size:13px;color:var(--text3);margin-top:8px;letter-spacing:1px;}
.sync-bar{max-width:960px;margin:0 auto;padding:10px 16px 0;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;}
.sync-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
.sync-dot.loading{background:var(--gold);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.backup-bar{display:flex;gap:8px;}
.backup-btn{background:var(--bg2);border:1px solid var(--gold-border);color:var(--text2);font-family:'Outfit',sans-serif;font-size:11px;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .2s;}
.backup-btn:hover{border-color:var(--gold);color:var(--gold);}
.stats-bar{display:flex;justify-content:center;max-width:680px;margin:16px auto 40px;border:1px solid var(--gold-border);border-radius:var(--radius);overflow:hidden;background:var(--bg2);}
.stat-item{flex:1;text-align:center;padding:14px 8px;border-right:1px solid var(--gold-border);}
.stat-item:last-child{border-right:none;}
.stat-num{display:block;font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--gold2);line-height:1;}
.stat-lbl{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:3px;}
.tabs-wrap{display:flex;justify-content:center;gap:6px;padding:0 16px;margin-bottom:32px;flex-wrap:wrap;}
.tab-btn{background:var(--bg2);border:1px solid var(--gold-border);color:var(--text2);font-family:'Outfit',sans-serif;font-size:13px;font-weight:400;letter-spacing:1px;padding:9px 22px;border-radius:30px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;}
.tab-btn:hover{border-color:var(--gold);color:var(--gold);}
.tab-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold2);}
.main{max-width:960px;margin:0 auto;padding:0 16px 80px;}
.section{display:none;}.section.active{display:block;}
.filter-row{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
.filter-pills{display:flex;gap:5px;flex-wrap:wrap;}
.pill{padding:5px 13px;border-radius:20px;font-size:11px;letter-spacing:.5px;cursor:pointer;border:1px solid transparent;transition:all .18s;font-weight:400;}
.pill.all{background:var(--bg3);border-color:var(--gold-border);color:var(--text2);}
.pill.watching{background:rgba(76,126,201,.12);border-color:rgba(76,126,201,.3);color:#7aa8e8;}
.pill.playing{background:rgba(58,168,155,.12);border-color:rgba(58,168,155,.3);color:#5dcfbf;}
.pill.onhold{background:rgba(201,122,58,.12);border-color:rgba(201,122,58,.3);color:#e8a060;}
.pill.backlog{background:rgba(139,110,201,.12);border-color:rgba(139,110,201,.3);color:#b09ee8;}
.pill.completed{background:rgba(76,170,110,.12);border-color:rgba(76,170,110,.3);color:#6dcc96;}
.pill.dropped{background:rgba(201,76,76,.12);border-color:rgba(201,76,76,.3);color:#e87a7a;}
.pill.planned{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.3);color:#e8c97a;}
.pill.active-filter,.pill:hover{filter:brightness(1.3);border-color:currentColor;}
.add-btn{background:var(--gold-dim);border:1px solid var(--gold);color:var(--gold2);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;padding:8px 20px;border-radius:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;letter-spacing:.5px;}
.add-btn:hover{background:rgba(201,168,76,.25);}
.entries-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.entry-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:18px;transition:border-color .2s,transform .2s;position:relative;overflow:hidden;}
.entry-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.entry-card.watching::before{background:linear-gradient(to right,transparent,#4c7ec9,transparent);}
.entry-card.playing::before{background:linear-gradient(to right,transparent,#3aa89b,transparent);}
.entry-card.onhold::before{background:linear-gradient(to right,transparent,#c97a3a,transparent);}
.entry-card.backlog::before{background:linear-gradient(to right,transparent,#8b6ec9,transparent);}
.entry-card.completed::before{background:linear-gradient(to right,transparent,#4caa6e,transparent);}
.entry-card.dropped::before{background:linear-gradient(to right,transparent,#c94c4c,transparent);}
.entry-card.planned::before{background:linear-gradient(to right,transparent,#c9a84c,transparent);}
.entry-card:hover{border-color:var(--gold-border);transform:translateY(-2px);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--text);line-height:1.2;flex:1;}
.card-actions{display:flex;gap:4px;transition:opacity .2s;}

.card-act-btn{background:var(--bg3);border:1px solid var(--bg4);color:var(--text3);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.card-act-btn:hover{border-color:var(--gold-border);color:var(--gold);}
.card-act-btn.del:hover{border-color:rgba(201,76,76,.4);color:#e87a7a;}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:10px;font-weight:500;}
.status-badge.watching{background:rgba(76,126,201,.15);color:#7aa8e8;}
.status-badge.playing{background:rgba(58,168,155,.15);color:#5dcfbf;}
.status-badge.onhold{background:rgba(201,122,58,.15);color:#e8a060;}
.status-badge.backlog{background:rgba(139,110,201,.15);color:#b09ee8;}
.status-badge.completed{background:rgba(76,170,110,.15);color:#6dcc96;}
.status-badge.dropped{background:rgba(201,76,76,.15);color:#e87a7a;}
.status-badge.planned{background:rgba(201,168,76,.15);color:#e8c97a;}
.platinum-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;font-weight:600;background:linear-gradient(135deg,rgba(180,130,255,.25),rgba(255,200,80,.15));border:1px solid rgba(220,180,100,.5);color:#f0c060;}
.platinum-btn{background:none;border:1px solid var(--bg4);border-radius:20px;font-size:11px;padding:3px 10px;cursor:pointer;color:var(--text3);transition:all .2s;letter-spacing:.5px;display:inline-flex;align-items:center;gap:4px;}
.platinum-btn:hover{border-color:rgba(220,180,100,.5);color:#f0c060;}
.platinum-btn.active{background:linear-gradient(135deg,rgba(180,130,255,.2),rgba(255,200,80,.15));border-color:rgba(220,180,100,.5);color:#f0c060;}
.entry-card.platinumed{
  background:linear-gradient(145deg,#1a1030,#120d24,#1e1535) !important;
  border-color:rgba(220,180,100,.4) !important;
  box-shadow:0 0 0 1px rgba(220,180,100,.2), 0 4px 24px rgba(160,100,255,.15), 0 0 40px rgba(160,100,255,.06);
}
.entry-card.platinumed::before{
  background:linear-gradient(to right,rgba(180,130,255,.6),rgba(255,200,80,.8),rgba(180,130,255,.6)) !important;
  height:2px;
}
.entry-card.platinumed .card-title{color:#f0e8ff;}
.entry-card.platinumed .star.filled{color:#f0c060;}
.entry-card.platinumed .card-thoughts{color:#a090c0;border-color:rgba(180,130,255,.15);}
.entry-card.platinumed .status-badge.completed{background:rgba(180,130,255,.2);color:#c8a8ff;border:1px solid rgba(180,130,255,.3);}
.entry-card.platinumed .card-act-btn{background:rgba(255,255,255,.04);border-color:rgba(180,130,255,.2);}
@keyframes plat-shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.entry-card.platinumed .card-title{
  background:linear-gradient(90deg,#f0e8ff,#f0c060,#c8a8ff,#f0c060,#f0e8ff);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:plat-shimmer 4s linear infinite;
}
.status-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.card-rating{display:flex;gap:3px;margin-bottom:10px;}
.star{font-size:14px;color:var(--text3);cursor:pointer;transition:color .1s;}
.star.filled{color:var(--gold);}
.star:hover{color:var(--gold2);}
.card-thoughts{font-size:13px;color:var(--text2);line-height:1.6;font-style:italic;border-top:1px solid var(--bg4);padding-top:10px;margin-top:6px;}
.card-thoughts:empty{display:none;}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4;}
.empty-state p{font-size:13px;letter-spacing:1px;}
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--gold-border);border-radius:14px;padding:30px 28px;width:100%;max-width:440px;animation:modalIn .25s cubic-bezier(.34,1.3,.64,1) forwards;}
@keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--gold2);margin-bottom:22px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;font-weight:500;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;padding:10px 14px;transition:border-color .2s;outline:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold-border);}
.form-select option{background:var(--bg3);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6;}
.rating-input{display:flex;gap:6px;}
.rating-star{font-size:22px;color:var(--text3);cursor:pointer;transition:color .1s;user-select:none;}
.rating-star.filled{color:var(--gold);}
.modal-actions{display:flex;gap:10px;margin-top:22px;}
.btn-save{flex:1;background:var(--gold-dim);border:1px solid var(--gold);color:var(--gold2);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;padding:11px;border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:.5px;}
.btn-save:hover{background:rgba(201,168,76,.25);}
.btn-cancel{background:var(--bg3);border:1px solid var(--bg4);color:var(--text2);font-family:'Outfit',sans-serif;font-size:14px;padding:11px 20px;border-radius:8px;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{border-color:var(--gold-border);color:var(--text);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
</style>
</head>
<body>
<header>
  <p class="header-eyebrow">Personal Collection</p>
  <h1>Ahmad's <span>Vault</span></h1>
  <p class="header-sub">Movies · Series · Anime · Games</p>
</header>

<div class="sync-bar">
  <div class="sync-status"><div class="sync-dot loading" id="sync-dot"></div><span id="sync-label">Connecting...</span></div>
  <div class="backup-bar">
    <button class="backup-btn" onclick="exportData()">⬇ Export</button>
    <button class="backup-btn" onclick="document.getElementById('import-input').click()">⬆ Import</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)"/>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item"><span class="stat-num" id="st-total">0</span><span class="stat-lbl">Total</span></div>
  <div class="stat-item"><span class="stat-num" id="st-inprogress">0</span><span class="stat-lbl" id="lbl-inprogress">Watching</span></div>
  <div class="stat-item"><span class="stat-num" id="st-completed">0</span><span class="stat-lbl">Completed</span></div>
  <div class="stat-item"><span class="stat-num" id="st-onhold">0</span><span class="stat-lbl" id="lbl-onhold">On Hold</span></div>
  <div class="stat-item"><span class="stat-num" id="st-backlog">0</span><span class="stat-lbl" id="lbl-backlog">Backlog</span></div>
  <div class="stat-item"><span class="stat-num" id="st-dropped">0</span><span class="stat-lbl">Dropped</span></div>
</div>

<div class="tabs-wrap">
  <button class="tab-btn active" onclick="switchTab('movies',this)"><span>🎬</span> Movies</button>
  <button class="tab-btn" onclick="switchTab('series',this)"><span>📺</span> Series</button>
  <button class="tab-btn" onclick="switchTab('anime',this)"><span>⛩️</span> Anime</button>
  <button class="tab-btn" onclick="switchTab('games',this)"><span>🎮</span> Games</button>
</div>

<div class="main">
  <div id="sec-movies" class="section active"></div>
  <div id="sec-series" class="section"></div>
  <div id="sec-anime" class="section"></div>
  <div id="sec-games" class="section"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <p class="modal-title" id="modal-title">Add Entry</p>
    <input type="hidden" id="edit-id"/>
    <input type="hidden" id="edit-cat"/>
    <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="f-title" type="text" placeholder="Enter title..."/></div>
    <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="f-status"></select></div>
    <div class="form-group"><label class="form-label">Rating</label>
      <div class="rating-input" id="rating-input">
        <span class="rating-star" data-v="1">★</span><span class="rating-star" data-v="2">★</span><span class="rating-star" data-v="3">★</span><span class="rating-star" data-v="4">★</span><span class="rating-star" data-v="5">★</span>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Your Thoughts</label><textarea class="form-textarea" id="f-thoughts" placeholder="What did you think?"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<script>
var SB_URL = 'https://oludgjpyrennjfkizmas.supabase.co';
var SB_KEY = 'sb_publishable_iPOfDAFeSbuFD95Ibnr05w_U9fQHHvJ';

function sbFetch(path, opts){
  return fetch(SB_URL+path, Object.assign({
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}
  }, opts));
}

var data={movies:[],series:[],anime:[],games:[]};
var currentTab='movies';
var currentFilter={movies:'all',series:'all',anime:'all',games:'all'};
var editRating=0;
var editingId=null;

var STATUSES={
  movies:[{k:'watching',l:'Watching'},{k:'completed',l:'Completed'},{k:'dropped',l:'Dropped'},{k:'planned',l:'Plan to Watch'}],
  series:[{k:'watching',l:'Watching'},{k:'onhold',l:'On Hold'},{k:'completed',l:'Completed'},{k:'dropped',l:'Dropped'},{k:'planned',l:'Plan to Watch'}],
  anime:[{k:'watching',l:'Watching'},{k:'onhold',l:'On Hold'},{k:'completed',l:'Completed'},{k:'dropped',l:'Dropped'},{k:'planned',l:'Plan to Watch'}],
  games:[{k:'playing',l:'Playing'},{k:'backlog',l:'Backlog'},{k:'onhold',l:'On Hold'},{k:'completed',l:'Completed'},{k:'dropped',l:'Dropped'},{k:'planned',l:'Plan to Play'}]
};
var ALL_STATUS_LABELS={watching:'Watching',playing:'Playing',onhold:'On Hold',backlog:'Backlog',completed:'Completed',dropped:'Dropped',planned:'Planned'};
var tabIcons={movies:'🎬',series:'📺',anime:'⛩️',games:'🎮'};

function setSyncStatus(state,msg){
  var dot=document.getElementById('sync-dot');
  var lbl=document.getElementById('sync-label');
  dot.className='sync-dot '+state;
  lbl.textContent=msg;
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

async function togglePlatinum(id){
  var entry=data.games.find(function(e){return e.id===id;});
  if(!entry)return;
  entry.platinum=!entry.platinum;
  localStorage.setItem('ahmads-vault',JSON.stringify(data));
  try{sbFetch('/rest/v1/vault?id=eq.'+id,{method:'PATCH',body:JSON.stringify({platinum:entry.platinum})}).catch(function(){});}catch(e){}
  renderSection('games');
}

async function loadAll(){
  setSyncStatus('loading','Loading...');
  try{
    var res=await sbFetch('/rest/v1/vault?select=*&order=created_at.desc');
    if(!res.ok) throw new Error();
    var rows=await res.json();
    data={movies:[],series:[],anime:[],games:[]};
    rows.forEach(function(r){
      if(data[r.cat]!==undefined) data[r.cat].push({id:r.id,title:r.title,status:r.status,rating:r.rating||0,thoughts:r.thoughts||'',platinum:r.platinum||false});
    });
    setSyncStatus('ok','Synced');
    renderSection(currentTab);
  }catch(e){
    setSyncStatus('err','Offline — using local data');
    try{var s=localStorage.getItem('ahmads-vault');if(s){data=JSON.parse(s);renderSection(currentTab);}}catch(ex){}
  }
}

async function saveEntry(){
  var cat=document.getElementById('edit-cat').value;
  var title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  var existing=editingId?data[cat].find(function(e){return e.id===editingId;}):null;
  var entry={id:editingId||uid(),cat:cat,title:title,status:document.getElementById('f-status').value,rating:editRating,thoughts:document.getElementById('f-thoughts').value.trim(),platinum:existing?existing.platinum||false:false};
  setSyncStatus('loading','Saving...');
  try{
    if(editingId){
      sbFetch('/rest/v1/vault?id=eq.'+editingId,{method:'PATCH',body:JSON.stringify({title:entry.title,status:entry.status,rating:entry.rating,thoughts:entry.thoughts})});
      var idx=data[cat].findIndex(function(e){return e.id===editingId;});
      if(idx>-1)data[cat][idx]=entry;
    }else{
      sbFetch('/rest/v1/vault',{method:'POST',body:JSON.stringify({id:entry.id,cat:entry.cat,title:entry.title,status:entry.status,rating:entry.rating,thoughts:entry.thoughts,platinum:entry.platinum})});
      data[cat].unshift(entry);
    }
    setSyncStatus('ok','Saved ✓');
    localStorage.setItem('ahmads-vault',JSON.stringify(data));
  }catch(e){
    setSyncStatus('err','Saved locally only');
    if(editingId){var idx=data[cat].findIndex(function(x){return x.id===editingId;});if(idx>-1)data[cat][idx]=entry;}
    else data[cat].unshift(entry);
    localStorage.setItem('ahmads-vault',JSON.stringify(data));
  }
  closeModal();renderSection(cat);
}

async function deleteEntry(cat,id){
  setSyncStatus('loading','Deleting...');
  try{
    sbFetch('/rest/v1/vault?id=eq.'+id,{method:'DELETE'});
    setSyncStatus('ok','Synced');
  }catch(e){setSyncStatus('err','Offline');}
  data[cat]=data[cat].filter(function(e){return e.id!==id;});
  localStorage.setItem('ahmads-vault',JSON.stringify(data));
  renderSection(cat);
}

async function quickRate(cat,id,r){
  var e=data[cat].find(function(x){return x.id===id;});
  if(!e)return;
  e.rating=r;
  localStorage.setItem('ahmads-vault',JSON.stringify(data));
  try{sbFetch('/rest/v1/vault?id=eq.'+id,{method:'PATCH',body:JSON.stringify({rating:r})}).catch(function(){});}catch(ex){}
  renderSection(cat);
}

function switchTab(cat,btn){
  currentTab=cat;
  currentFilter={movies:'all',series:'all',anime:'all',games:'all'};
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(function(s){
    s.classList.remove('active');
    s.innerHTML='';
  });
  document.getElementById('sec-'+cat).classList.add('active');
  renderSection(cat);
}

function setFilter(cat,status,el){
  currentFilter[cat]=status;
  el.closest('.filter-pills').querySelectorAll('.pill').forEach(function(p){p.classList.remove('active-filter');});
  el.classList.add('active-filter');
  renderSection(cat);
}

function renderSection(cat){
  var sec=document.getElementById('sec-'+cat);
  var filter=currentFilter[cat];
  var filtered=filter==='all'?data[cat]:data[cat].filter(function(e){return e.status===filter;});
  var html='<div class="filter-row"><div class="filter-pills">';
  html+=makePill('all','All',cat,filter);
  STATUSES[cat].forEach(function(s){html+=makePill(s.k,s.l,cat,filter);});
  html+='</div><button class="add-btn" onclick="openModal(\''+cat+'\',null)">+ Add</button></div><div class="entries-grid">';
  if(!filtered.length){
    html+='<div class="empty-state"><div class="empty-icon">'+tabIcons[cat]+'</div><p>Nothing here yet</p></div>';
  }else{
    filtered.forEach(function(e){html+=renderCard(e,cat);});
  }
  html+='</div>';sec.innerHTML=html;updateStats();
}

function makePill(k,l,cat,active){
  var cls='pill '+(k==='all'?'all':k)+(active===k?' active-filter':'');
  return '<span class="'+cls+'" onclick="setFilter(\''+cat+'\',\''+k+'\',this)">'+l+'</span>';
}

function renderCard(e,cat){
  var stars='';
  for(var i=1;i<=5;i++) stars+='<span class="star'+(i<=e.rating?' filled':'')+'" onclick="quickRate(\''+cat+'\',\''+e.id+'\','+i+')">★</span>';
  var label=ALL_STATUS_LABELS[e.status]||e.status;
  var isPlatinum=e.platinum&&cat==='games';
  return '<div class="entry-card '+e.status+(isPlatinum?' platinumed':'')+'">'
    +'<div class="card-top"><div class="card-title">'+esc(e.title)+'</div>'
    +'<div class="card-actions"><button class="card-act-btn" onclick="openModal(\''+cat+'\',\''+e.id+'\')">✎</button>'
    +'<button class="card-act-btn del" onclick="deleteEntry(\''+cat+'\',\''+e.id+'\')">✕</button></div></div>'
    +'<div class="card-meta" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;">'
    +'<span class="status-badge '+e.status+'"><span class="status-dot"></span>'+label+'</span>'
    +(isPlatinum?'<span class="platinum-badge">🏆 Platinum</span>':'')
    +'</div>'
    +'<div class="card-rating">'+stars+'</div>'
    +(cat==='games'&&e.status==='completed'?'<button class="platinum-btn'+(isPlatinum?' active':'')+'" onclick="togglePlatinum(\''+e.id+'\')" style="margin-bottom:8px;">'+(isPlatinum?'🏆 Platinumed':'🏆 Mark Platinum')+'</button>':'')
    +(e.thoughts?'<div class="card-thoughts">'+esc(e.thoughts)+'</div>':'')
    +'</div>';
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function buildStatusSelect(cat,selected){
  var sel=document.getElementById('f-status');sel.innerHTML='';
  STATUSES[cat].forEach(function(s){var o=document.createElement('option');o.value=s.k;o.textContent=s.l;if(s.k===selected)o.selected=true;sel.appendChild(o);});
}

function openModal(cat,id){
  editingId=id;
  document.getElementById('edit-cat').value=cat;
  document.getElementById('modal-title').textContent=id?'Edit Entry':'Add to '+cat.charAt(0).toUpperCase()+cat.slice(1);
  if(id){
    var entry=data[cat].find(function(e){return e.id===id;});
    document.getElementById('f-title').value=entry.title;
    document.getElementById('f-thoughts').value=entry.thoughts||'';
    editRating=entry.rating||0;
    buildStatusSelect(cat,entry.status);
  }else{
    document.getElementById('f-title').value='';
    document.getElementById('f-thoughts').value='';
    editRating=0;
    buildStatusSelect(cat,STATUSES[cat][0].k);
  }
  updateRatingStars(editRating);
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('f-title').focus();},100);
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');editingId=null;}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.querySelectorAll('.rating-star').forEach(function(star){
  star.addEventListener('click',function(){editRating=parseInt(this.getAttribute('data-v'));updateRatingStars(editRating);});
  star.addEventListener('mouseover',function(){updateRatingStars(parseInt(this.getAttribute('data-v')));});
});
document.getElementById('rating-input').addEventListener('mouseleave',function(){updateRatingStars(editRating);});
function updateRatingStars(val){document.querySelectorAll('.rating-star').forEach(function(s){s.classList.toggle('filled',parseInt(s.getAttribute('data-v'))<=val);});}

function updateStats(){
  var entries = data[currentTab] || [];
  var isGames = currentTab === 'games';
  var isMovies = currentTab === 'movies';

  document.getElementById('st-total').textContent      = entries.length;
  document.getElementById('st-inprogress').textContent = entries.filter(function(e){ return e.status==='watching'||e.status==='playing'; }).length;
  document.getElementById('st-completed').textContent  = entries.filter(function(e){ return e.status==='completed'; }).length;
  document.getElementById('st-onhold').textContent     = entries.filter(function(e){ return e.status==='onhold'; }).length;
  document.getElementById('st-backlog').textContent    = entries.filter(function(e){ return e.status==='backlog'; }).length;
  document.getElementById('st-dropped').textContent    = entries.filter(function(e){ return e.status==='dropped'; }).length;

  // update labels to match section
  document.getElementById('lbl-inprogress').textContent = isGames ? 'Playing' : 'Watching';
  document.getElementById('lbl-backlog').textContent    = isGames ? 'Backlog' : 'Planned';
  document.getElementById('lbl-onhold').textContent     = isMovies ? 'Planned' : 'On Hold';
}

function exportData(){
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='ahmads-vault-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
function importData(event){
  var file=event.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=async function(e){
    try{
      var imported=JSON.parse(e.target.result);
      if(imported.movies!==undefined){
        var all=[];
        ['movies','series','anime','games'].forEach(function(cat){
          (imported[cat]||[]).forEach(function(item){all.push({id:item.id,cat:cat,title:item.title,status:item.status,rating:item.rating||0,thoughts:item.thoughts||''});});
        });
        setSyncStatus('loading','Importing...');
        for(var i=0;i<all.length;i++){
          sbFetch('/rest/v1/vault',{method:'POST',body:JSON.stringify(all[i])}).catch(function(){});
        }
        await loadAll();
      }
    }catch(err){alert('Could not read file');}
  };
  reader.readAsText(file);event.target.value='';
}

loadAll();
</script>
